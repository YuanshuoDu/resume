name: Build Resume PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex latexmk

      - name: Build PDF
        run: xelatex -interaction=nonstopmode resume.tex

      - name: Rename
        run: mv resume.pdf YuanshuoDu_Resume.pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: YuanshuoDu_Resume.pdf

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resume-pdf
          path: .

      - name: Commit PDF to gh-pages
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git checkout gh-pages || git checkout --orphan gh-pages
          cp YuanshuoDu_Resume.pdf index.pdf
          git add index.pdf
          git commit -m "Update resume PDF [skip ci]"
          git push origin gh-pages --force
