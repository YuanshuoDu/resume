name: Build Resume PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-extra fonts-freefont-otf latexmk

      - name: Install fontawesome6 via tlmgr
        run: |
          sudo apt-get install -y texlive-base
          if command -v tlmgr &> /dev/null; then
            sudo tlmgr install fontawesome6 2>&1 || echo "tlmgr install failed"
          else
            echo "tlmgr not found"
          fi

      - name: Install fontawesome6 via direct download
        run: |
          sudo mkdir -p /tmp/fa6 /usr/share/texmf/tex/latex/fontawesome6
          cd /tmp/fa6
          curl -L -o fontawesome6.tds.zip --max-time 60 \
            "https://mirrors.ctan.org/install/fonts/fontawesome6/fontawesome6.tds.zip" 2>&1 || \
          wget -q fontawesome6.tds.zip --timeout=60 \
            "https://mirrors.ctan.org/install/fonts/fontawesome6/fontawesome6.tds.zip" 2>&1 || \
          echo "Download failed"
          ls -la /tmp/fa6/

      - name: Extract and install fontawesome6
        run: |
          cd /tmp/fa6
          if [ -f fontawesome6.tds.zip ]; then
            sudo unzip -o fontawesome6.tds.zip -d /usr/share/texmf/ 2>&1
            sudo fmtutil-sys --all 2>&1 || echo "fmtutil failed"
          else
            echo "No zip file found"
          fi

      - name: Verify fontawesome6
        run: |
          find /usr/share/texmf -name "fontawesome6*" 2>/dev/null | head -10
          kpsewhich fontawesome6.sty 2>/dev/null || echo "not found via kpsewhich"

      - name: Build PDF
        run: |
          xelatex -interaction=nonstopmode resume.tex 2>&1 | tail -20
          xelatex -interaction=nonstopmode resume.tex 2>&1 | tail -5

      - name: Rename output
        run: |
          if [ -f resume.pdf ]; then
            mv resume.pdf YuanshuoDu_Resume.pdf
          else
            echo "ERROR: resume.pdf not found"
            ls -la *.pdf *.log 2>/dev/null || true
          fi

      - name: Upload artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: YuanshuoDu_Resume.pdf
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resume-pdf
          path: .

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
