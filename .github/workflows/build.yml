name: Build Resume PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex fonts-freefont-otf latexmk

      - name: Clone fontawesome5
        run: |
          cd $HOME
          git clone --depth=1 https://github.com/posquit0/latex-fontawesome.git
          sudo cp -r latex-fontawesome /usr/share/texmf/tex/latex/fontawesome5

      - name: Clone sourcesanspro
        run: |
          cd $HOME
          git clone --depth=1 https://github.com/ianspdf/sourcesanspro.git
          sudo cp -r sourcesanspro /usr/share/texmf/tex/latex/sourcesanspro
          sudo cp -r sourcesanspro/source /usr/share/texmf/tex/latex/sourcesanspro/ 2>/dev/null || true

      - name: Update TeXMF database
        run: |
          sudo mktexlsr /usr/share/texmf
          sudo texhash /usr/share/texmf

      - name: Build PDF
        run: xelatex -interaction=nonstopmode resume.tex

      - name: Rename output
        run: mv resume.pdf YuanshuoDu_Resume.pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: YuanshuoDu_Resume.pdf

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resume-pdf
          path: .

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
