name: Build Resume & Cover Letter PDFs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex latexmk fonts-freefont-otf

      - name: Build Resume PDF
        run: |
          cp fonts/*.otf .
          xelatex -interaction=nonstopmode resume.tex
          xelatex -interaction=nonstopmode resume.tex
          rm -f *.otf

      - name: Build Cover Letter PDF
        run: |
          cp fonts/*.otf .
          xelatex -interaction=nonstopmode coverletter.tex
          xelatex -interaction=nonstopmode coverletter.tex
          rm -f *.otf

      - name: Prepare artifact
        run: |
          mkdir -p resume-artifact
          mv resume.pdf resume-artifact/YuanshuoDu_Resume.pdf
          mv coverletter.pdf resume-artifact/YuanshuoDu_CoverLetter.pdf
          # Include index.html and .nojekyll for GitHub Pages
          cp index.html resume-artifact/ 2>/dev/null || true
          cp .nojekyll resume-artifact/ 2>/dev/null || true

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./resume-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
