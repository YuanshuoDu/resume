name: Build Resume PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-luatex texlive-xetex fonts-freefont-otf latexmk fonts-font-awesome
          # Refresh font cache
          sudo fc-cache -f -v

      - name: Build PDF
        run: lualatex -interaction=nonstopmode resume.tex

      - name: Rename output
        run: mv resume.pdf YuanshuoDu_Resume.pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: YuanshuoDu_Resume.pdf

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resume-pdf
          path: .

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
